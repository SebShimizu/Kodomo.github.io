<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>OJN Sinaloa - Merch</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>

<body
  class="min-h-screen text-[#363334] bg-cover bg-center bg-fixed overflow-x-hidden"
  style="background-image: url('fondo.jpeg');">

<div class="max-w-md md:max-w-5xl mx-auto px-3 md:px-6 pb-40">

  <!-- HEADER -->

  <div class="sticky top-0 z-50 py-4 mb-6 backdrop-blur-md bg-[#FFFEEB]/85 rounded-b-3xl">
<div class="flex justify-start mb-4">

  <a

    href="Menu.html"

    class="bg-[#363334] text-white px-6 py-3 rounded-2xl font-black shadow-xl hover:scale-105 transition">

    ← Menú

  </a>

</div>
    <div class="text-center">

      <h1 class="text-4xl md:text-6xl font-black text-[#8C0D11]">
        OJN Sinaloa
      </h1>

      <p class="text-lg md:text-2xl font-bold">
        Stand Merch
      </p>

      <p class="text-sm md:text-lg text-[#8C0D11]">
        Sistema de gestión de ventas
      </p>

    </div>

  </div>

  <!-- CARD PRINCIPAL -->

  <div class="bg-white/95 backdrop-blur-md rounded-[2rem] shadow-2xl p-4 md:p-8 border border-[#8C0D11]/10">

    <!-- PRODUCTOS -->

    <div class="grid md:grid-cols-2 gap-6">

      <!-- TABLITAS -->

      <div class="bg-[#FFF4F4] p-5 rounded-3xl border border-[#8C0D11]/10">

        <h2 class="text-2xl md:text-3xl font-black mb-4">
          Tablitas - $40
        </h2>

        <div class="grid grid-cols-3 gap-2">

          <button
            onclick="addSale('Tablitas',40)"
            class="bg-[#8C0D11] hover:opacity-90 text-white py-6 rounded-2xl text-xl md:text-2xl font-bold">

            +

          </button>

          <button
            onclick="removeSale('Tablitas',40)"
            class="bg-[#363334] hover:opacity-90 text-white py-6 rounded-2xl text-xl md:text-2xl font-bold">

            -

          </button>

          <button
            onclick="addPending('Tablitas',40)"
            class="bg-[#C11111] hover:opacity-90 text-white py-6 rounded-2xl text-sm md:text-lg font-bold">

            Pendiente

          </button>

        </div>

      </div>

      <!-- STICKER -->

      <div class="bg-[#FFF4F4] p-5 rounded-3xl border border-[#8C0D11]/10">

        <h2 class="text-2xl md:text-3xl font-black mb-4">
          Sticker - $5
        </h2>

        <div class="grid grid-cols-3 gap-2">

          <button
            onclick="addSale('Sticker',5)"
            class="bg-[#8C0D11] hover:opacity-90 text-white py-6 rounded-2xl text-xl md:text-2xl font-bold">

            +

          </button>

          <button
            onclick="removeSale('Sticker',5)"
            class="bg-[#363334] hover:opacity-90 text-white py-6 rounded-2xl text-xl md:text-2xl font-bold">

            -

          </button>

          <button
            onclick="addPending('Sticker',5)"
            class="bg-[#C11111] hover:opacity-90 text-white py-6 rounded-2xl text-sm md:text-lg font-bold">

            Pendiente

          </button>

        </div>

      </div>

      <!-- POSTER -->

      <div class="bg-[#FFF4F4] p-5 rounded-3xl border border-[#8C0D11]/10">

        <h2 class="text-2xl md:text-3xl font-black mb-4">
          Poster - $20
        </h2>

        <div class="grid grid-cols-3 gap-2">

          <button
            onclick="addSale('Poster',20)"
            class="bg-[#8C0D11] hover:opacity-90 text-white py-6 rounded-2xl text-xl md:text-2xl font-bold">

            +

          </button>

          <button
            onclick="removeSale('Poster',20)"
            class="bg-[#363334] hover:opacity-90 text-white py-6 rounded-2xl text-xl md:text-2xl font-bold">

            -

          </button>

          <button
            onclick="addPending('Poster',20)"
            class="bg-[#C11111] hover:opacity-90 text-white py-6 rounded-2xl text-sm md:text-lg font-bold">

            Pendiente

          </button>

        </div>

      </div>

      <!-- ORIGAMI -->

      <div class="bg-[#FFF4F4] p-5 rounded-3xl border border-[#8C0D11]/10">

        <h2 class="text-2xl md:text-3xl font-black mb-4">
          Origami - $5
        </h2>

        <div class="grid grid-cols-3 gap-2">

          <button
            onclick="addSale('Origami',5)"
            class="bg-[#8C0D11] hover:opacity-90 text-white py-6 rounded-2xl text-xl md:text-2xl font-bold">

            +

          </button>

          <button
            onclick="removeSale('Origami',5)"
            class="bg-[#363334] hover:opacity-90 text-white py-6 rounded-2xl text-xl md:text-2xl font-bold">

            -

          </button>

          <button
            onclick="addPending('Origami',5)"
            class="bg-[#C11111] hover:opacity-90 text-white py-6 rounded-2xl text-sm md:text-lg font-bold">

            Pendiente

          </button>

        </div>

      </div>

      <!-- DIBUJO -->

      <div class="bg-[#FFF4F4] p-5 rounded-3xl border border-[#8C0D11]/10">

        <h2 class="text-2xl md:text-3xl font-black mb-4">
          Dibujo - $5
        </h2>

        <div class="grid grid-cols-3 gap-2">

          <button
            onclick="addSale('Dibujo',5)"
            class="bg-[#8C0D11] hover:opacity-90 text-white py-6 rounded-2xl text-xl md:text-2xl font-bold">

            +

          </button>

          <button
            onclick="removeSale('Dibujo',5)"
            class="bg-[#363334] hover:opacity-90 text-white py-6 rounded-2xl text-xl md:text-2xl font-bold">

            -

          </button>

          <button
            onclick="addPending('Dibujo',5)"
            class="bg-[#C11111] hover:opacity-90 text-white py-6 rounded-2xl text-sm md:text-lg font-bold">

            Pendiente

          </button>

        </div>

      </div>

    </div>

    <!-- RESUMEN -->

    <hr class="my-8">

    <div class="space-y-3 text-lg md:text-2xl">

      <div class="flex justify-between">
        <span>Tablitas</span>
        <span id="tablitas">0</span>
      </div>

      <div class="flex justify-between">
        <span>Sticker</span>
        <span id="sticker">0</span>
      </div>

      <div class="flex justify-between">
        <span>Poster</span>
        <span id="poster">0</span>
      </div>

      <div class="flex justify-between">
        <span>Origami</span>
        <span id="origami">0</span>
      </div>

      <div class="flex justify-between">
        <span>Dibujo</span>
        <span id="dibujo">0</span>
      </div>

    </div>

    <!-- PENDIENTES -->

    <div class="mt-10">

      <h2 class="text-3xl md:text-4xl font-black text-[#8C0D11] mb-5">
        Pendientes
      </h2>

      <div id="pendingList" class="space-y-4">

      </div>

    </div>

    <!-- RESET -->

    <button
      onclick="resetSales()"
      class="mt-10 w-full bg-[#8C0D11] hover:opacity-90 text-white py-5 rounded-3xl text-xl md:text-2xl font-black">

      Corte de Caja Merch

    </button>

  </div>

</div>

<!-- TOTAL FIJO -->

<div class="fixed bottom-0 left-0 right-0 z-50 p-3">

  <div class="max-w-md md:max-w-5xl mx-auto bg-[#363334] text-white rounded-3xl p-5 shadow-2xl">

    <div class="flex justify-between items-center">

      <span class="text-2xl md:text-3xl font-bold">
        Total
      </span>

      <span class="text-4xl md:text-5xl font-black">
        $<span id="total">0</span>
      </span>

    </div>

  </div>

</div>

<script>
const supabaseUrl =
'https://ktvneighjktwjffjefbh.supabase.co';

const supabaseKey =
'sb_publishable_aOvjgc-i2PXwvO9ISBg0TA_dizK34ZQ';

const supabaseClient =
supabase.createClient(
  supabaseUrl,
  supabaseKey
);

const usuario = JSON.parse(

  localStorage.getItem(
    "usuarioActual"
  )

);

if(!usuario){

  window.location.href =
  "index.html";

}

const RESET_PASSWORD = "1178";
const REMOVE_PASSWORD = "1914";
const PAGADO_PASSWORD = "1824";
const CANCELAR_PASSWORD = "1814";

let total = 0;

const counts = {

  Tablitas: 0,
  Sticker: 0,
  Poster: 0,
  Origami: 0,
  Dibujo: 0

};

async function addSale(product, price){

  counts[product]++;

  total += price;

  updateUI();

  const { error } = await supabaseClient

  .from("ventas")

  .insert([{

    usuario: usuario.usuario,

    stand: "merch",

    producto: product,

    cantidad: 1,

    precio: price,

    total: price,

    tipo: "venta"

  }]);

  if(error){

    console.log(error);

    alert(
      "Error guardando venta"
    );

  }

}

function removeSale(product, price){

  const password = prompt(
    "Contraseña para restar:"
  );

  if(password !== REMOVE_PASSWORD){

    alert("Contraseña incorrecta");

    return;
  }

  if(counts[product] <= 0) return;

  counts[product]--;

  total -= price;

  updateUI();
}

async function addPending(product, price){

  const client = prompt(
    "Nombre del cliente:"
  );

  if(!client) return;

  const quantity = parseInt(

    prompt("Cantidad:")

  );

  if(!quantity || quantity <= 0) return;

  const { error } = await supabaseClient

  .from("pendientes")

  .insert([{

    usuario: usuario.usuario,

    stand: "merch",

    producto: product,

    cliente: client,

    cantidad: quantity,

    precio: price

  }]);

  if(error){

    console.log(error);

    alert(
      "Error guardando pendiente"
    );

    return;

  }

  loadPendings();

}

async function payPending(id){

  const password = prompt(
    "Contraseña para confirmar pago:"
  );

  if(password !== PAGADO_PASSWORD){

    alert("Contraseña incorrecta");

    return;

  }

  const { data } = await supabaseClient

  .from("pendientes")

  .select("*")

  .eq("id", id)

  .single();

  if(!data) return;

  await supabaseClient

  .from("ventas")

  .insert([{

    usuario: usuario.usuario,

    stand: "merch",

    producto: data.producto,

    cantidad: data.cantidad,

    precio: data.precio,

    total:
      Number(data.precio) *
      Number(data.cantidad),

    tipo: "venta"

  }]);

  await supabaseClient

  .from("pendientes")

  .delete()

  .eq("id", id);

  loadSales();

  loadPendings();

}

async function cancelPending(id){

  const password = prompt(
    "Contraseña para cancelar pendiente:"
  );

  if(password !== CANCELAR_PASSWORD){

    alert("Contraseña incorrecta");

    return;

  }

  await supabaseClient

  .from("pendientes")

  .delete()

  .eq("id", id);

  loadPendings();

}

async function loadSales(){

  const { data, error } =

  await supabaseClient

  .from("ventas")

  .select("*")

  .eq("stand", "merch")

  .eq("tipo", "venta");

  if(error){

    console.log(error);

    return;

  }

  counts.Tablitas = 0;
  counts.Sticker = 0;
  counts.Poster = 0;
  counts.Origami = 0;
  counts.Dibujo = 0;

  total = 0;

  data.forEach(v => {

    counts[v.producto] +=
      Number(v.cantidad);

    total +=
      Number(v.total);

  });

  updateUI();

}
function updateUI(){

  document.getElementById('tablitas').innerText =
    counts.Tablitas;

  document.getElementById('sticker').innerText =
    counts.Sticker;

  document.getElementById('poster').innerText =
    counts.Poster;

  document.getElementById('origami').innerText =
    counts.Origami;

  document.getElementById('dibujo').innerText =
    counts.Dibujo;

  document.getElementById('total').innerText =
    total;
}

async function loadPendings(){

  const container =
    document.getElementById(
      'pendingList'
    );

  container.innerHTML = '';

  const { data, error } =

  await supabaseClient

  .from("pendientes")

  .select("*")

  .eq("stand", "merch");

  if(error){

    console.log(error);

    return;

  }

  if(data.length === 0){

    container.innerHTML = `

      <div class="text-gray-500">

        Sin pendientes

      </div>

    `;

    return;

  }

  data.forEach(item => {

    container.innerHTML += `

      <div class="bg-[#FFF4F4] border-l-8 border-[#C11111] p-5 rounded-3xl flex flex-col md:flex-row gap-4 md:items-center md:justify-between">

        <div>

          <div class="font-black text-xl md:text-2xl">

            ${item.producto}

          </div>

          <div class="mt-1">

            Cliente:
            <strong>${item.cliente}</strong>

          </div>

          <div>

            Cantidad:
            ${item.cantidad}

          </div>

          <div class="font-bold text-[#8C0D11]">

            Debe:
            $${item.precio * item.cantidad}

          </div>

        </div>

        <div class="flex gap-2 w-full md:w-auto">

          <button

            onclick="payPending(${item.id})"

            class="bg-[#363334] text-white flex-1 py-4 px-6 rounded-2xl text-lg font-bold">

            Pagado

          </button>

          <button

            onclick="cancelPending(${item.id})"

            class="bg-[#8C0D11] text-white flex-1 py-4 px-6 rounded-2xl text-lg font-bold">

            Cancelar

          </button>

        </div>

      </div>

    `;

  });

}
async function resetSales(){

  const password = prompt(
    "Contraseña para reiniciar:"
  );

  if(password !== RESET_PASSWORD){

    alert("Contraseña incorrecta");

    return;

  }

  const { error } = await supabaseClient

  .from("ventas")

  .delete()

  .eq("stand", "merch");

  if(error){

    console.log(error);

    alert(
      "Error reiniciando"
    );

    return;

  }

  counts.Tablitas = 0;
  counts.Sticker = 0;
  counts.Poster = 0;
  counts.Origami = 0;
  counts.Dibujo = 0;

  total = 0;

  updateUI();
  loadPendings();

  alert(
    "Corte realizado"
  );

}
</script>

</body>
</html>
